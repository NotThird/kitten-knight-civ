name: CI

on:
  push:
  pull_request:

jobs:
  sanity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Parse/import sanity check
        run: node scripts/parse_check.js

      - name: Replay test (canned save)
        run: node scripts/replay_test.js
